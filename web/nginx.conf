server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # No URI in proxy_pass -> the original request path is forwarded as-is,
    # matching the backend's own /api/... route prefixes exactly.
    location /api/ {
        proxy_pass http://app:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /health {
        proxy_pass http://app:3000/health;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
