services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME:-geo-optimize}
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:?set MONGO_ROOT_USERNAME in .env}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:?set MONGO_ROOT_PASSWORD in .env}
    volumes:
      - mongo_data:/data/db
    networks:
      - geobase

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      BACKEND_PORT: ${BACKEND_PORT:-4000}
      AUTH_USERNAME: ${AUTH_USERNAME:?set AUTH_USERNAME in .env}
      AUTH_PASSWORD: ${AUTH_PASSWORD:?set AUTH_PASSWORD in .env}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      MONGODB_URI: ${MONGODB_URI_DOCKER:?set MONGODB_URI_DOCKER in .env}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      DEEPINFRA_API_KEY: ${DEEPINFRA_API_KEY:-}
      DEEPINFRA_OPENAI_MODEL: ${DEEPINFRA_OPENAI_MODEL:-openai/gpt-oss-120b}
      DEEPINFRA_GEMINI_MODEL: ${DEEPINFRA_GEMINI_MODEL:-google/gemini-2.5-flash}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      MAIL_FROM: ${MAIL_FROM:-}
      APP_URL: ${APP_URL:-http://localhost:3002}
    networks:
      - geobase

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      BACKEND_INTERNAL_URL: http://backend:${BACKEND_PORT:-4000}
    ports:
      - "${FRONTEND_PORT:-3001}:3001"
    networks:
      - geobase

networks:
  geobase:
    driver: bridge

volumes:
  mongo_data:
